name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e:
    name: E2E - Tilt + k6
    uses: ./.github/workflows/e2e.yml

  goreleaser:
    name: GoReleaser
    needs: [e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev llvm-dev pkg-config libudev-dev libusb-1.0-0-dev

      - name: Install Protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          version: "25.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          shared-key: release-goreleaser

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Export Rust version
        run: echo "RUST_VERSION=$(rustc --version)" >> "${GITHUB_ENV}"

      - name: Verify tag matches Cargo package versions
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          cargo metadata --format-version=1 --locked --no-deps > cargo-metadata.json
          python3 - "$tag_version" <<'PY'
          import json
          import sys

          expected = sys.argv[1]
          packages = {"superbank-workspace", "superbank", "superbank-rpc"}
          with open("cargo-metadata.json", encoding="utf-8") as f:
              metadata = json.load(f)

          mismatches = [
              (package["name"], package["version"])
              for package in metadata["packages"]
              if package["name"] in packages and package["version"] != expected
          ]
          if mismatches:
              for name, version in mismatches:
                  print(f"{name} version {version} does not match release tag v{expected}", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          version: "~> v2"
          args: release --clean --config .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
